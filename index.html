<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Coming soon...</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
      margin: 0;
    }

    body {
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      color: #ffffff;
      background:
        linear-gradient(rgba(0, 0, 0, 0.28), rgba(0, 0, 0, 0.42)),
        url("background.jpg") center / cover no-repeat fixed;
    }

    main {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 48px 24px;
      text-align: center;
    }

    .logo {
      width: min(280px, 70vw);
      height: auto;
      display: block;
      margin-bottom: 28vh;
    }

    h1 {
      margin: 0;
      font-size: clamp(2.25rem, 7vw, 5.5rem);
      font-weight: 700;
      line-height: 1.05;
      text-shadow: 0 3px 18px rgba(0, 0, 0, 0.45);
    }

    @media (max-width: 640px) {
      main {
        padding-top: 32px;
      }

      .logo {
        margin-bottom: 24vh;
      }
    }
  </style>
</head>
<body>
  <main>
    <img class="logo" src="logo.png" alt="">
    <h1>Coming soon...</h1>
  </main>
</body>
</html>
